name: iOSAppIject Build

on:
  # Run manually from the Actions tab
  workflow_dispatch:
  # Optional: run on tag pushes
  push:
    tags:
      - "v*"

env:
  # CHANGE THESE TO MATCH YOUR PROJECT
  SCHEME: iOSAppInject          # e.g. app target / scheme name
  PROJECT: iOSAppInject.xcodeproj      # or comment out and use WORKSPACE below
  # WORKSPACE: YourApp.xcworkspace     # uncomment & use if you use CocoaPods/SPM workspace
  CONFIGURATION: Release
  ARCHIVE_PATH: ${{ github.workspace }}/build/iOSAppInject.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export

jobs:
  build-and-export:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: pin a specific Xcode version
      # - name: Select Xcode version
      #   uses: maxim-lobanov/setup-xcode@v1
      #   with:
      #     xcode-version: "16.0"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and archive (iOS device)
        run: |
          set -o pipefail

          if [ -n "${WORKSPACE:-}" ]; then
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -archivePath "$ARCHIVE_PATH" \
              clean archive | xcpretty
          else
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -archivePath "$ARCHIVE_PATH" \
              clean archive | xcpretty
          fi

      - name: Create generic ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>

            <key>compileBitcode</key>
            <false/>

            <key>destination</key>
            <string>export</string>

            <key>stripSwiftSymbols</key>
            <true/>

            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export .ipa
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist | xcpretty

          echo "Exported files:"
          ls -R "$EXPORT_PATH"

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TemplateInjectorApp-ipa
          path: ${{ env.EXPORT_PATH }}/*.ipa
          if-no-files-found: error

      # OPTIONAL: also create a GitHub Release for tagged builds
      # - name: Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: ${{ env.EXPORT_PATH }}/*.ipa
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}