name: iOSAppInject Build

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-export:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find Project and Build
        run: |
          # 1. Try to generate a project if only Package.swift exists
          if [ -f "Package.swift" ]; then
            swift package generate-xcodeproj
          fi

          # 2. Find the project file dynamically
          PROJECT_PATH=$(find . -name "*.xcodeproj" -print -quit)
          if [ -z "$PROJECT_PATH" ]; then
            echo "Error: No .xcodeproj or Package.swift found!"
            exit 1
          fi
          
          # 3. Get the Scheme name
          SCHEME_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          echo "Building Scheme: $SCHEME_NAME"

          # 4. Build the Archive (No Signing Required for LiveContainer)
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package for LiveContainer
        run: |
          # LiveContainer just needs the .app inside a Payload folder
          mkdir -p Payload
          cp -r ./build/App.xcarchive/Products/Applications/*.app ./Payload/
          zip -r iOSAppInject.ipa Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-Ready-IPA
          path: iOSAppInject.ipa